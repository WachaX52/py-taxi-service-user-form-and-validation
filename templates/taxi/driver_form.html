{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <h1>Create driver</h1>

  <form action="" method="post" novalidate>
    {% csrf_token %}

    {{ form|crispy }}

    <button type="submit" class="btn btn-primary">
      Submit
    </button>

    <a href="{% url 'taxi:driver-list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
